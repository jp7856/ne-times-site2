<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NE Times — 발행 기사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#d32f2f;--navy:#0d1b3e;--bg:#f4f4f4;--text:#111;--muted:#666;--border:#e0e0e0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}

.util-bar{background:var(--navy);color:#8899bb;font-size:11px;padding:5px 20px;display:flex;justify-content:space-between}
header{background:#fff;border-bottom:3px solid var(--red);padding:14px 20px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-family:'Noto Serif KR',serif;font-size:36px;font-weight:900;color:var(--navy);letter-spacing:-1px;line-height:1}
.logo em{color:var(--red);font-style:normal}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:.06em;margin-top:3px}

.cat-nav{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.cat-nav-inner{max-width:1200px;margin:0 auto;display:flex;overflow-x:auto}
.cat-tab{padding:12px 20px;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.cat-tab:hover{color:var(--text)}
.cat-tab.active{color:var(--red);border-bottom-color:var(--red)}
.cat-cnt{font-size:10px;background:#eee;color:var(--muted);padding:1px 6px;border-radius:10px;font-weight:700}
.cat-tab.active .cat-cnt{background:var(--red);color:#fff}

.page-wrap{max-width:1200px;margin:0 auto;padding:0 20px 48px}
.section-bar{margin:16px 0 12px;display:flex;align-items:center;gap:10px}
.section-title{font-size:15px;font-weight:900;color:var(--navy);border-left:4px solid var(--red);padding-left:10px}
.section-count{font-size:11px;color:var(--muted)}
.section-line{flex:1;height:1px;background:var(--border)}

/* 메인 + 사이드 */
.top-grid{display:grid;grid-template-columns:1fr 320px;gap:24px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.main-art{cursor:pointer}
.main-art:hover .main-title{color:var(--red)}
.main-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;border-radius:2px;background:#e8e8e8}
.main-img-ph{width:100%;aspect-ratio:16/9;background:#e8eaf6;border-radius:2px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:32px}
.main-badges{display:flex;gap:6px;margin:10px 0 6px;align-items:center;flex-wrap:wrap}
.main-title{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:900;line-height:1.4;color:var(--text);margin-bottom:8px;transition:color .15s}
.main-body{font-size:13px;color:var(--muted);line-height:1.8;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.main-date{font-size:11px;color:#aaa;margin-top:8px}

.side-list{border-left:1px solid var(--border);padding-left:20px;display:flex;flex-direction:column}
.side-item{display:grid;grid-template-columns:80px 1fr;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.side-item:first-child{padding-top:0}
.side-item:last-child{border-bottom:none}
.side-item:hover .side-title{color:var(--red)}
.side-thumb{width:80px;aspect-ratio:4/3;object-fit:cover;border-radius:2px;display:block;background:#e8e8e8}
.side-thumb-ph{width:80px;aspect-ratio:4/3;background:#e8eaf6;border-radius:2px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:16px}
.side-title{font-size:13px;font-weight:700;line-height:1.4;color:var(--text);margin-bottom:5px;transition:color .15s;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.side-badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.side-date{font-size:10px;color:#aaa}

/* 그리드 */
.grid-wrap{margin-bottom:24px;border-top:2px solid var(--red)}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr)}
@media(max-width:760px){.grid-3{grid-template-columns:1fr}.top-grid{grid-template-columns:1fr}.side-list{border-left:none;padding-left:0}}
.grid-item{padding:16px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;background:#fff}
.grid-item:nth-child(3n){border-right:none}
.grid-item:hover .grid-title{color:var(--red)}
.grid-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;border-radius:2px;margin-bottom:8px;background:#e8e8e8}
.grid-img-ph{width:100%;aspect-ratio:16/9;background:#e8eaf6;border-radius:2px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:20px}
.grid-badges{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap;align-items:center}
.grid-title{font-size:14px;font-weight:700;line-height:1.45;color:var(--text);margin-bottom:5px;transition:color .15s;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.grid-body{font-size:12px;color:var(--muted);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.grid-date{font-size:10px;color:#aaa;margin-top:6px}

/* 레벨 뱃지 */
.mbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;letter-spacing:.04em}
.b-kinder{background:#fff3e0;color:#bf360c}
.b-kids{background:#e8f5e9;color:#1b5e20}
.b-junior{background:#e3f2fd;color:#0d47a1}
.b-times{background:#f3e5f5;color:#4a148c}
.b-junior_m{background:#e0f2f1;color:#00695c}
.lvbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;background:#eceff1;color:#546e7a}

/* 기사 모달 */
.article-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px}
.article-overlay.show{display:flex}
.article-modal{background:#fff;border-radius:8px;width:100%;max-width:820px;margin:auto;overflow:hidden;position:relative;box-shadow:0 12px 48px rgba(0,0,0,.25)}
.article-modal-close{position:absolute;top:14px;right:16px;background:rgba(0,0,0,.5);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
.article-modal-close:hover{background:var(--red)}
.article-header{padding:24px 28px 16px;border-bottom:1px solid var(--border)}
.article-badges{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.article-title{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:900;line-height:1.4;color:var(--navy);margin-bottom:6px}
.article-meta{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.article-hero-wrap{background:#f8f8f8;text-align:center;border-bottom:1px solid var(--border)}
.article-hero{max-width:100%;max-height:380px;object-fit:contain}
.article-text-col{padding:24px 28px 32px}
.article-body{font-size:15px;line-height:2;color:var(--text);white-space:pre-line}
.ko-toggle{margin-top:18px;background:none;border:1px solid var(--border);border-radius:3px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--muted)}
.ko-toggle:hover{border-color:var(--red);color:var(--red)}
.ko-body{display:none;margin-top:14px;padding:16px;background:#fafafa;border-radius:6px;font-size:13px;line-height:1.9;white-space:pre-line;color:#333}
.ko-body.show{display:block}
.ko-summary{font-weight:700;color:var(--navy);margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed var(--border)}
.vocab{color:var(--muted);font-size:13px;margin-top:16px;padding-top:14px;border-top:1px dashed var(--border);line-height:2}
.vocab b{color:var(--red)}

.state-box{padding:60px 20px;text-align:center}
.state-icon{font-size:44px;margin-bottom:12px;opacity:.3}
.state-title{font-size:18px;font-weight:700;color:var(--muted);margin-bottom:6px}
.state-msg{font-size:13px;color:#aaa;line-height:1.8}
.spinner{width:28px;height:28px;border:3px solid #ddd;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

footer{background:var(--navy);color:#8899bb;font-size:11px;text-align:center;padding:20px}
</style>
</head>
<body>

<div class="util-bar">
  <span id="today"></span>
  <span>NE Times Content Pipeline — Published Articles</span>
</div>

<header>
  <div class="header-inner">
    <div>
      <div class="logo">NE <em>Times</em></div>
      <div class="logo-sub">ENGLISH EDUCATION NEWSPAPER · 발행 기사 모음</div>
    </div>
  </div>
</header>

<nav class="cat-nav">
  <div class="cat-nav-inner" id="cat-tabs"></div>
</nav>

<div class="page-wrap" id="content">
  <div class="state-box">
    <div class="spinner"></div>
    <div class="state-msg">발행된 기사를 불러오는 중...</div>
  </div>
</div>

<!-- 기사 모달 -->
<div class="article-overlay" id="article-overlay" onclick="if(event.target===this)closeArticle()">
  <div class="article-modal">
    <button class="article-modal-close" onclick="closeArticle()">✕</button>
    <div id="article-content"></div>
  </div>
</div>

<footer>© NE Times Content Pipeline · Powered by Claude</footer>

<script>
// ────────────────────────────────────────────────
// 설정: 파이프라인 서버 주소 (Railway v4)
const API_BASE = "https://web-production-8adb9.up.railway.app";
// ────────────────────────────────────────────────

const LEVELS = [
  { key: "all",      label: "전체" },
  { key: "kinder",   label: "Kinder" },
  { key: "kids",     label: "Kids" },
  { key: "junior",   label: "Junior" },
  { key: "times",    label: "Times" },
  { key: "junior_m", label: "Junior M" },
];

let _articles = [];
let _activeTab = "all";

document.getElementById("today").textContent =
  new Date().toLocaleDateString("ko-KR", { year:"numeric", month:"long", day:"numeric", weekday:"long" });

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function badge(level) {
  return `<span class="mbadge b-${esc(level)}">${esc(level.toUpperCase().replace("_", " "))}</span>`;
}

function imgOrPh(url, cls, phCls, icon) {
  return url
    ? `<img class="${cls}" src="${esc(url)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;${phCls}&quot;>${icon}</div>'">`
    : `<div class="${phCls}">${icon}</div>`;
}

// 기사 제목: 본문 첫 문장 사용 (토픽이 한국어면 본문에서 추출)
function titleOf(a) {
  const firstSentence = (a.article.text || "").split(/(?<=[.!?])\s/)[0] || a.topic;
  return firstSentence.length > 90 ? a.topic : firstSentence;
}

function renderTabs() {
  const counts = { all: _articles.length };
  for (const lv of ["kinder","kids","junior","times"]) {
    counts[lv] = _articles.filter(a => a.level === lv).length;
  }
  document.getElementById("cat-tabs").innerHTML = LEVELS.map(t => `
    <div class="cat-tab ${t.key === _activeTab ? "active" : ""}" onclick="switchTab('${t.key}')">
      ${t.label} <span class="cat-cnt">${counts[t.key] || 0}</span>
    </div>`).join("");
}

function switchTab(key) {
  _activeTab = key;
  renderTabs();
  renderList();
}

function renderList() {
  const el = document.getElementById("content");
  const list = _activeTab === "all" ? _articles : _articles.filter(a => a.level === _activeTab);

  if (list.length === 0) {
    el.innerHTML = `
      <div class="state-box">
        <div class="state-icon">📰</div>
        <div class="state-title">발행된 기사가 없습니다</div>
        <div class="state-msg">파이프라인에서 기사를 생성하고 '발행하기'를 누르면<br>이곳에 표시됩니다.</div>
      </div>`;
    return;
  }

  const [main, ...rest] = list;
  const side = rest.slice(0, 4);
  const grid = rest.slice(4);

  let html = `
    <div class="section-bar">
      <div class="section-title">${_activeTab === "all" ? "최신 발행 기사" : "NE Times " + (LEVELS.find(t => t.key === _activeTab) || { label: _activeTab }).label}</div>
      <div class="section-count">${list.length}건</div>
      <div class="section-line"></div>
    </div>

    <div class="top-grid">
      <div class="main-art" onclick="openArticle(${_articles.indexOf(main)})">
        ${imgOrPh(main.image_url, "main-img", "main-img-ph", "📰")}
        <div class="main-badges">${badge(main.level)}<span class="lvbadge">${esc(main.section)}</span></div>
        <div class="main-title">${esc(titleOf(main))}</div>
        <div class="main-body">${esc(main.article.summary_ko || main.article.text)}</div>
        <div class="main-date">${esc(main.created_at)}</div>
      </div>
      <div class="side-list">
        ${side.map(a => `
          <div class="side-item" onclick="openArticle(${_articles.indexOf(a)})">
            ${imgOrPh(a.image_url, "side-thumb", "side-thumb-ph", "📰")}
            <div>
              <div class="side-title">${esc(titleOf(a))}</div>
              <div class="side-badges">${badge(a.level)}<span class="side-date">${esc(a.created_at)}</span></div>
            </div>
          </div>`).join("")}
      </div>
    </div>`;

  if (grid.length > 0) {
    html += `
      <div class="grid-wrap">
        <div class="grid-3">
          ${grid.map(a => `
            <div class="grid-item" onclick="openArticle(${_articles.indexOf(a)})">
              ${imgOrPh(a.image_url, "grid-img", "grid-img-ph", "📰")}
              <div class="grid-badges">${badge(a.level)}<span class="lvbadge">${esc(a.section)}</span></div>
              <div class="grid-title">${esc(titleOf(a))}</div>
              <div class="grid-body">${esc(a.article.summary_ko || a.article.text)}</div>
              <div class="grid-date">${esc(a.created_at)}</div>
            </div>`).join("")}
        </div>
      </div>`;
  }

  el.innerHTML = html;
}

function openArticle(idx) {
  const a = _articles[idx];
  if (!a) return;
  document.getElementById("article-content").innerHTML = `
    <div class="article-header">
      <div class="article-badges">${badge(a.level)}<span class="lvbadge">${esc(a.section)}</span></div>
      <div class="article-title">${esc(titleOf(a))}</div>
      <div class="article-meta">
        <span>📅 ${esc(a.created_at)}</span>
        <span>📝 ${a.article.word_count} words</span>
        <span>🏷️ ${esc(a.topic)}</span>
      </div>
    </div>
    ${a.image_url ? `<div class="article-hero-wrap"><img class="article-hero" src="${esc(a.image_url)}" alt=""></div>` : ""}
    <div class="article-text-col">
      <div class="article-body">${esc(a.article.text)}</div>
      <button class="ko-toggle" onclick="document.getElementById('ko-body').classList.toggle('show')">🇰🇷 한국어 번역 보기 / 닫기</button>
      <div class="ko-body" id="ko-body">
        ${a.article.summary_ko ? `<div class="ko-summary">요약 — ${esc(a.article.summary_ko)}</div>` : ""}
        ${esc(a.article.text_ko || "번역 없음")}
      </div>
      ${a.article.vocabulary && a.article.vocabulary.length ? `
        <div class="vocab"><b>Vocabulary</b> — ${a.article.vocabulary.map(esc).join(" · ")}</div>` : ""}
    </div>`;
  document.getElementById("article-overlay").classList.add("show");
  document.body.style.overflow = "hidden";
}

function closeArticle() {
  document.getElementById("article-overlay").classList.remove("show");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeArticle(); });

async function load() {
  try {
    const res = await fetch(API_BASE + "/api/published");
    if (!res.ok) throw new Error("HTTP " + res.status);
    _articles = (await res.json()).reverse(); // 최신순
    renderTabs();
    renderList();
  } catch (e) {
    document.getElementById("content").innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        <div class="state-title">기사를 불러오지 못했습니다</div>
        <div class="state-msg">파이프라인 서버에 연결할 수 없습니다.<br>${esc(e.message)}</div>
      </div>`;
    renderTabs();
  }
}

load();
</script>
</body>
</html>
